<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message for Alifiya ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff758c;
            --bg: #fff5f6;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* --- ENVELOPE STYLES --- */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            transition: 0.5s;
            z-index: 10;
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background: var(--secondary);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 4;
            border-top: 110px solid var(--primary);
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            transform-origin: top;
            transition: all 0.5s ease-in-out;
        }

        .envelope::after {
            content: "";
            position: absolute;
            z-index: 3;
            width: 0;
            height: 0;
            border-top: 100px solid transparent;
            border-left: 150px solid var(--secondary);
            border-right: 150px solid var(--secondary);
            border-bottom: 100px solid var(--secondary);
            bottom: 0;
            border-radius: 10px;
        }

        .letter {
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 80%;
            background: white;
            z-index: 2;
            transition: all 0.5s ease-in-out;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 5px;
            text-align: center;
            color: var(--primary);
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .envelope-wrapper.open .envelope::before { transform: rotateX(180deg); z-index: 1; }
        .envelope-wrapper.open .letter { transform: translateY(-120px); height: 180px; z-index: 2; }

        /* --- MAIN CONTENT --- */
        #mainCard {
            display: none;
            width: 90%;
            max-width: 450px;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 2.8rem; color: var(--primary); margin: 5px 0; }

        /* Love Meter Styles */
        .meter-container { margin: 20px 0; }
        input[type=range] {
            width: 80%;
            accent-color: var(--primary);
            cursor: pointer;
        }
        #meterVal { font-weight: 600; color: var(--primary); font-size: 1.1rem; }

        /* Timer Styles */
        .timer-container {
            background: #fff0f3;
            padding: 10px;
            border-radius: 15px;
            margin: 15px 0;
            border: 1px solid #ffe3e8;
        }
        #timerDisplay {
            font-weight: 600;
            color: var(--primary);
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .reason-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .reason-btn:hover { background: var(--primary); color: white; }

        .btn-container {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            opacity: 0.3; /* Hidden until meter is full */
            pointer-events: none;
            transition: 0.5s;
        }

        .yes-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        #noBtn {
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
        }

        .heart { position: fixed; top: -10%; animation: fall linear forwards; z-index: -1; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelopeWrapper" onclick="openLetter()">
        <div class="envelope">
            <div class="letter">Tap to open... ❤️</div>
        </div>
    </div>

    <div id="mainCard">
        <h1 id="typing"></h1>
        
        <div class="timer-container">
            <div style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">TIME SPENT KNOWING YOU</div>
            <div id="timerDisplay">Calculating...</div>
        </div>

        <button class="reason-btn" onclick="nextReason()">Click for a reason ❤️</button>
        <div id="reasonText" style="height: 30px; font-style: italic; margin-top: 10px; font-size: 0.9rem; color: #555;">...</div>

        <div class="meter-container">
            <label style="font-size: 0.8rem; color: #666;">How much do you love me?</label><br>
            <input type="range" id="loveSlider" min="0" max="100" value="0" oninput="updateMeter(this.value)">
            <div id="meterVal">0%</div>
        </div>

        <h2 id="questionHeader" style="margin-top: 10px; font-family: 'Dancing Script'; color: var(--primary); opacity: 0;">Will You Be Mine?</h2>

        <div class="btn-container" id="finalButtons">
            <button class="yes-btn" onclick="celebrate()">Yes 💕</button>
            <button id="noBtn" onmouseover="moveNo()">No 😢</button>
        </div>
    </div>

    <div id="celebration" style="display:none; text-align: center;">
        <h1 style="font-size: 4rem;">YES! ❤️</h1>
        <p>Thankyou soo much you are the best, Alifiya.</p>
        <div style="font-size: 3rem;">💍🌸✨</div>
    </div>

<script>
    const name = "Alifiya ❤️";
    const reasons = [
        "Your smile lights up my entire world.",
        "The way you understand me without words.",
        "Your kindness is infectious.",
        "Every small moment with you is a big memory.",
        "Simply because you are YOU."
    ];
    let reasonIndex = 0;

    // --- 1. TIMER LOGIC ---
    // Update the Date below to the day you met/started dating!
    const startDate = new Date(2026, 02, 29); // Format: (Year, Month[0-11], Day)

    function updateTimer() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const mins = Math.floor((diff / (1000 * 60)) % 60);
        const secs = Math.floor((diff / 1000) % 60);
        document.getElementById('timerDisplay').innerHTML = `${days}d ${hours}h ${mins}m ${secs}s`;
    }
    setInterval(updateTimer, 1000);

    // --- 2. LOVE METER LOGIC ---
    function updateMeter(val) {
        document.getElementById('meterVal').innerHTML = val + "%";
        const btns = document.getElementById('finalButtons');
        const header = document.getElementById('questionHeader');
        
        if (val >= 100) {
            document.getElementById('meterVal').innerHTML = "1000000% !!! ❤️";
            btns.style.opacity = "1";
            btns.style.pointerEvents = "all";
            header.style.opacity = "1";
        } else {
            btns.style.opacity = "0.2";
            btns.style.pointerEvents = "none";
            header.style.opacity = "0";
        }
    }

    function openLetter() {
        const wrapper = document.getElementById('envelopeWrapper');
        wrapper.classList.add('open');
        setTimeout(() => {
            wrapper.style.opacity = "0";
            wrapper.style.transform = "scale(0.5)";
            setTimeout(() => {
                wrapper.style.display = "none";
                document.getElementById('mainCard').style.display = "block";
                startTyping();
            }, 500);
        }, 1200);
    }

    function startTyping() {
        let i = 0;
        const target = document.getElementById("typing");
        function type() {
            if (i < name.length) {
                target.innerHTML += name.charAt(i);
                i++;
                setTimeout(type, 150);
            }
        }
        type();
    }

    function nextReason() {
        const text = document.getElementById('reasonText');
        text.style.opacity = 0;
        setTimeout(() => {
            text.innerHTML = reasons[reasonIndex];
            text.style.opacity = 1;
            reasonIndex = (reasonIndex + 1) % reasons.length;
        }, 300);
    }

    function moveNo() {
        const btn = document.getElementById("noBtn");
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        btn.style.position = "fixed";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }

    function celebrate() {
        document.getElementById("mainCard").style.display = "none";
        document.getElementById("celebration").style.display = "block";
        document.body.style.backgroundColor = "#fff";
        setInterval(createHeart, 200);
    }

    function createHeart() {
        const heart = document.createElement("div");
        heart.innerHTML = ["❤️", "💖", "🌸", "💕"][Math.floor(Math.random() * 4)];
        heart.classList.add("heart");
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 20) + "px";
        heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }
</script>
</body>
</html>
