<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Alifiya ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    text-align: center;
    overflow: hidden;
    color: white;
}

/* Glass card */
.container {
    margin-top: 100px;
    padding: 30px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    display: inline-block;
    backdrop-filter: blur(10px);
}

/* Typing effect */
#typing {
    font-size: 38px;
    font-weight: bold;
}

/* Message */
p {
    font-size: 18px;
    max-width: 500px;
    margin: 20px auto;
}

/* Buttons */
button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

#yesBtn {
    background: #ff4d6d;
    color: white;
}

#noBtn {
    background: white;
    color: #ff4d6d;
    position: absolute;
}

button:hover {
    transform: scale(1.1);
}

/* Floating hearts */
.heart {
    position: absolute;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* Celebration */
#celebration {
    display: none;
    margin-top: 150px;
    font-size: 30px;
}
</style>
</head>

<body>

<div class="container">
    <h1 id="typing"></h1>

    <p>
        You came into my life quietly, but changed everything.  
        Every moment with you feels magical ✨  
        My heart found its home in you 💖  
    </p>

    <h2>Will You Be Mine? 💍</h2>

    <button id="yesBtn" onclick="yesClicked()">Yes 💕</button>
    <button id="noBtn" onmouseover="moveButton()">No 😢</button>

    <br><br>
    <button onclick="playMusic()">🎵 Play Music</button>
</div>

<div id="celebration">
    💖 She Said YES! 💖<br>
    💍 Best Day Ever 😍
</div>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
// Typing effect
let text = "Alifiya ❤️";
let i = 0;
function typingEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typingEffect, 100);
    }
}
typingEffect();

// Yes click
function yesClicked() {
    document.querySelector(".container").style.display = "none";
    document.getElementById("celebration").style.display = "block";
}

// Moving No button
function moveButton() {
    let btn = document.getElementById("noBtn");
    btn.style.left = Math.random() * window.innerWidth + "px";
    btn.style.top = Math.random() * window.innerHeight + "px";
}

// Music
function playMusic() {
    document.getElementById("music").play();
}

// Floating hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 20 + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 300);
</script>

</body>
</html>
