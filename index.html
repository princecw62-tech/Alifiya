<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message for Alifiya ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff758c;
            --bg: #fff5f6;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            transition: background-color 1s ease;
        }

        /* --- ENVELOPE STYLES --- */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            transition: 0.5s;
            z-index: 10;
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background: var(--secondary);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 4;
            border-top: 110px solid var(--primary);
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            transform-origin: top;
            transition: all 0.5s ease-in-out;
        }

        .envelope::after {
            content: "";
            position: absolute;
            z-index: 3;
            width: 0;
            height: 0;
            border-top: 100px solid transparent;
            border-left: 150px solid var(--secondary);
            border-right: 150px solid var(--secondary);
            border-bottom: 100px solid var(--secondary);
            bottom: 0;
            border-radius: 10px;
        }

        .letter {
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 80%;
            background: white;
            z-index: 2;
            transition: all 0.5s ease-in-out;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 5px;
            text-align: center;
            color: var(--primary);
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .envelope-wrapper.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-120px);
            height: 180px;
            z-index: 2;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }

        /* --- MAIN CONTENT --- */
        #mainCard {
            display: none;
            width: 90%;
            max-width: 450px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; color: var(--primary); margin: 10px 0; }

        .reason-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 15px;
            border-radius: 20px;
            margin: 15px 0;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
            font-weight: 600;
        }

        .reason-btn:hover { background: var(--primary); color: white; }

        #reasonText { 
            font-style: italic; 
            min-height: 40px; 
            margin: 10px 0; 
            font-size: 1rem; 
            color: #555; 
            transition: opacity 0.3s ease;
        }

        .btn-container {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .yes-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
            transition: transform 0.2s;
        }

        .yes-btn:active { transform: scale(0.95); }

        #noBtn {
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s ease;
            z-index: 100;
        }

        .heart { 
            position: fixed; 
            top: -10%; 
            animation: fall linear forwards; 
            z-index: -1; 
            pointer-events: none;
        }

        @keyframes fall { 
            to { transform: translateY(110vh) rotate(360deg); } 
        }

        #celebration {
            display: none;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelopeWrapper" onclick="openLetter()">
        <div class="envelope">
            <div class="letter">
                Tap to open... ❤️
            </div>
        </div>
    </div>

    <div id="mainCard">
        <h1 id="typing"></h1>
        <p>I built this little space just for you.</p>

        <button class="reason-btn" onclick="nextReason()">Click for a reason why ❤️</button>
        <div id="reasonText">Click the button above...</div>

        <h2 style="margin-top: 30px; font-family: 'Dancing Script'; font-size: 2rem; color: var(--primary);">Will You Be Mine?</h2>

        <div class="btn-container">
            <button class="yes-btn" onclick="celebrate()">Yes 💕</button>
            <button id="noBtn" onmouseover="moveNo()" onclick="moveNo()">No 😢</button>
        </div>
    </div>

    <div id="celebration">
        <h1 style="font-size: 4.5rem;">YES! ❤️</h1>
        <p style="font-size: 1.2rem; color: #555;">I'm the luckiest person to have you, Alifiya.</p>
        <div style="font-size: 4rem; margin-top: 20px;">💍🌸✨</div>
    </div>

<script>
    const name = "Alifiya ❤️";
    const reasons = [
        "Your smile lights up my entire world.",
        "The way you understand me without words.",
        "Your kindness makes me want to be a better person.",
        "Every small moment with you is a big memory for me.",
        "Simply because you are YOU."
    ];
    let reasonIndex = 0;

    function openLetter() {
        const wrapper = document.getElementById('envelopeWrapper');
        wrapper.classList.add('open');
        
        setTimeout(() => {
            wrapper.style.opacity = "0";
            wrapper.style.transform = "scale(0.5)";
            setTimeout(() => {
                wrapper.style.display = "none";
                document.getElementById('mainCard').style.display = "block";
                startTyping();
            }, 500);
        }, 1200);
    }

    function startTyping() {
        let i = 0;
        const target = document.getElementById("typing");
        target.innerHTML = ""; 
        function type() {
            if (i < name.length) {
                target.innerHTML += name.charAt(i);
                i++;
                setTimeout(type, 150);
            }
        }
        type();
    }

    function nextReason() {
        const text = document.getElementById('reasonText');
        text.style.opacity = 0;
        setTimeout(() => {
            text.innerHTML = reasons[reasonIndex];
            text.style.opacity = 1;
            reasonIndex = (reasonIndex + 1) % reasons.length;
        }, 300);
    }

    function moveNo() {
        const btn = document.getElementById("noBtn");
        // Ensure the button stays within viewport boundaries
        const x = Math.random() * (window.innerWidth - btn.offsetWidth);
        const y = Math.random() * (window.innerHeight - btn.offsetHeight);
        
        btn.style.position = "fixed";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }

    function celebrate() {
        document.getElementById("mainCard").style.display = "none";
        document.body.style.backgroundColor = "#fff";
        document.getElementById("celebration").style.display = "block";
        
        // Intensified heart shower
        setInterval(createHeart, 150);
    }

    function createHeart() {
        const heart = document.createElement("div");
        const icons = ["❤️", "💖", "✨", "🌸", "💕"];
        heart.innerHTML = icons[Math.floor(Math.random() * icons.length)];
        heart.classList.add("heart");
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 20) + "px";
        heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
        document.body.appendChild(heart);
        
        setTimeout(() => heart.remove(), 5000);
    }
</script>
</body>
</html>
